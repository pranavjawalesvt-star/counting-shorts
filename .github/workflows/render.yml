name: Render Counting Short

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chrome deps for Remotion
        run: npx remotion browser ensure

      - name: Render video
        run: npx remotion render src/index.ts CountingShorts out/video.mp4

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: counting-short
          path: out/video.mp4
