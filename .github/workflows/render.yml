name: Render Counting Short

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 9 * * *"
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chrome deps for Remotion
        run: npx remotion browser ensure

      - name: Install Piper TTS
        run: |
          curl -L -o piper.tar.gz https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz
          tar -xzf piper.tar.gz
          curl -L -o voice.onnx https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/amy/medium/en_US-amy-medium.onnx
          curl -L -o voice.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/amy/medium/en_US-amy-medium.onnx.json
          
      - name: Generate themed content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node .github/workflows/scripts/generate-content.js
      - name: Generate narration audio
        run: |
          npm install --no-save ts-node typescript
          node -r ts-node/register/transpile-only .github/workflows/scripts/generate-narration.js
      - name: Render video
        run: npx remotion render src/index.ts CountingShorts out/video.mp4

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: counting-short
          path: out/video.mp4
